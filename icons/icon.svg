<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="6" y1="6" x2="506" y2="506">
      <stop offset="0%" stop-color="#9333EA"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="glossHighlight" cx="30%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="squircle">
      <rect x="6" y="6" width="500" height="500" rx="112"/>
    </clipPath>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="6" y="6" width="500" height="500" fill="url(#bg)"/>
    <polygon points="6,6 230,6 30,320 6,320" fill="#FFFFFF" opacity="0.07"/>
    <ellipse cx="170" cy="120" rx="220" ry="160" fill="url(#glossHighlight)"/>
    <rect x="6" y="340" width="500" height="166" fill="#000000" opacity="0.07"/>
  </g>

  <g>
    <rect x="151" y="161" width="212" height="210" rx="48" fill="#000000" opacity="0.18" filter="url(#softShadow)" transform="translate(0,6)"/>
    <rect x="150" y="160" width="212" height="210" rx="48" fill="#FFFFFF"/>
    <rect x="178" y="190" width="156" height="58" rx="18" fill="url(#bg)"/>
    <circle cx="196" cy="268" r="10" fill="#FFFFFF" stroke="url(#bg)" stroke-width="4"/>
    <circle cx="316" cy="268" r="10" fill="#FFFFFF" stroke="url(#bg)" stroke-width="4"/>
    <rect x="170" y="372" width="172" height="26" rx="10" fill="#FFFFFF"/>
    <circle cx="200" cy="392" r="26" fill="#FFFFFF"/>
    <circle cx="312" cy="392" r="26" fill="#FFFFFF"/>
  </g>

  <g>
    <circle cx="392" cy="126" r="64" fill="#000000" opacity="0.20" filter="url(#softShadow)"/>
    <circle cx="388" cy="120" r="64" fill="#FFFFFF"/>
    <circle cx="390" cy="146" r="7" fill="#5B4FE9"/>
    <path d="M 377.75 135.71 A 16 16 0 0 1 402.25 135.71" fill="none" stroke="#5B4FE9" stroke-width="9" stroke-linecap="round"/>
    <path d="M 367.02 126.71 A 30 30 0 0 1 412.98 126.71" fill="none" stroke="#5B4FE9" stroke-width="9" stroke-linecap="round"/>
    <path d="M 356.30 117.71 A 44 44 0 0 1 423.70 117.71" fill="none" stroke="#5B4FE9" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
